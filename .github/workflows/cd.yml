name: DriveEase CD

# Runs only after CI passes on main — never on pull requests.
on:
  push:
    branches: [ main ]

# Cancel any in-progress deploy if a newer commit arrives.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    environment: production        # requires manual approval in GitHub if you set it up

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install Azure Developer CLI
      - name: Install azd
        uses: azure/setup-azd@v2

      # 3. Login to Azure using the service principal stored in GitHub Secrets
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4. Restore the azd environment (points azd at your existing dev resources)
      - name: Set up azd environment
        run: |
          azd env new dev --no-prompt || true
          azd env set AZURE_SUBSCRIPTION_ID ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azd env set AZURE_LOCATION centralindia
        env:
          AZURE_ENV_NAME: dev

      # 5. Deploy — azd publishes the .NET app and ZIP-deploys it to App Service.
      - name: Deploy to App Service
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: dev
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
