name: DriveEase CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3. Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build solution (no restore, already done)
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 5. Run all unit tests (domain + application + API telemetry — no Docker needed)
      - name: Run Unit Tests
        run: |
          dotnet test tests/DriveEase.Enrollments.Domain.Tests/ --no-build --configuration Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage/unit
          dotnet test tests/DriveEase.Enrollments.Application.Tests/ --no-build --configuration Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage/unit
          dotnet test tests/DriveEase.Api.Tests/ --no-build --configuration Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage/unit

      # 6. Run integration tests (Testcontainers spins up SQL Server via Docker —
      #    ubuntu-latest runners have Docker pre-installed)
      - name: Run Integration Tests
        run: dotnet test tests/DriveEase.Api.IntegrationTests/ --no-build --configuration Release --verbosity normal \
          --collect:"XPlat Code Coverage" --results-directory ./coverage/integration

      # 7. Upload coverage reports as a build artifact
      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: ./coverage
          retention-days: 14
