<nav class="navbar">
  <a class="navbar-brand" routerLink="/schools">
    <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17H5a2 2 0 0 1 0-4l1.68-6.71A2 2 0 0 1 8.6 5h6.8a2 2 0 0 1 1.92 1.29L19 13"/><path d="M9 17v2"/><path d="M15 17v2"/><circle cx="9.5" cy="13.5" r="1.5"/><circle cx="14.5" cy="13.5" r="1.5"/></svg>
    DriveEase
  </a>

  @if (auth.isLoggedIn()) {
    <div class="navbar-links">
      <a routerLink="/schools" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Schools
      </a>
      <a routerLink="/my-enrollment" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        My Enrollment
      </a>
      <a routerLink="/lessons" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        My Lessons
      </a>
    </div>
    <div class="navbar-user">
      <div class="user-avatar">{{ auth.fullName().charAt(0).toUpperCase() }}</div>
      <span class="user-name">{{ auth.fullName() }}</span>
      <button class="btn-logout" (click)="logout()">Sign out</button>
    </div>
  }
</nav>
